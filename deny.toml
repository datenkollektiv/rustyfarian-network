[graph]
targets = []
all-features = false
no-default-features = false

[advisories]
ignore = [
    # atomic-polyfill is unmaintained (RUSTSEC-2023-0089) but there is no safe
    # upgrade path.  Exact chain (confirmed via `cargo deny check` output):
    #   rustyfarian-esp-idf-lora → lorawan-device 0.12.2 → heapless 0.7.17 → atomic-polyfill 1.0.3
    # Note: the workspace declares heapless 0.8; lorawan-device 0.12 has its own
    # separate transitive dep on heapless 0.7, which is why both versions coexist.
    # Resolves when lorawan-device upgrades to heapless 0.8 (not yet in 0.12).
    "RUSTSEC-2023-0089",
    # paste is unmaintained (RUSTSEC-2024-0436) — transitive via esp-hal 1.0.
    # No upgrade path until esp-hal replaces paste with pastey.
    "RUSTSEC-2024-0436",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "ISC",
    "Unlicense",
    "Zlib",
    "Unicode-3.0",
    "0BSD",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/datenkollektiv/rustyfarian-ws2812"]
